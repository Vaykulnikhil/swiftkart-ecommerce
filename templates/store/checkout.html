{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="section-content padding-y bg">
<div class="container">

<div class="row">

    <!-- ================= BILLING ADDRESS ================= -->
    <aside class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-4">Billing Address</h4>

                <form action="{% url 'place_order' %}" method="POST">
                    {% csrf_token %}
                    <div class="form-row">
                        <div class="col form-group">
                            <label>First Name</label>
                            <input type="text" name="first_name" class="form-control" required>
                        </div>
                        <div class="col form-group">
                            <label>Last Name</label>
                            <input type="text" name="last_name" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="col form-group">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col form-group">
                            <label>Phone Number</label>
                            <input type="text" name="phone" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="col form-group">
                            <label>Address Line 1</label>
                            <input type="text" name="address_line_1" class="form-control" required>
                        </div>
                        <div class="col form-group">
                            <label>Address Line 2</label>
                            <input type="text" name="address_line_2" class="form-control">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="col form-group">
                            <label>City</label>
                            <input type="text" name="city" class="form-control" required>
                        </div>
                        <div class="col form-group">
                            <label>State</label>
                            <input type="text" name="state" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="col form-group">
                            <label>Country</label>
                            <input type="text" name="country" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Order Note</label>
                        <textarea name="order_note" rows="3" class="form-control"></textarea>
                    </div>
           
            </div>
        </div>
    </aside>

    <!-- ================= RIGHT SIDE ================= -->
    <aside class="col-lg-6">

        <!-- ================= PRODUCT TABLE (ABOVE PLACE ORDER) ================= -->
        <div class="card shadow-sm mb-3">
            <table class="table table-borderless table-shopping-cart align-middle">
                <thead class="text-muted border-bottom">
                    <tr class="small text-uppercase">
                        <th>Product</th>
                        <th width="160">Quantity</th>
                        <th width="120">Price</th>
                    </tr>
                </thead>

                <tbody>
                {% for cart_item in cart_items %}
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="{{ cart_item.product.images.url }}" class="img-sm rounded me-3">
                            <a href="{{ cart_item.product.get_url }}" class="text-dark">
                                {{ cart_item.product.product_name }}
                            </a>
                        </div>
                    </td>

                    <td>
                        <label>{{ cart_item.quantity }}</label>
                    </td>
                    <td>
                        <strong>$ {{ cart_item.sub_total }}</strong>
                    </td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- ================= PLACE ORDER ================= -->
        <div class="card shadow-sm">
            <div class="card-body">
                 <button type="submit" class="btn btn-primary btn-block mb-2">Place Order</button>

                <a href="{% url 'store' %}" class="btn btn-light btn-block">
                    Continue Shopping
                </a>
            </div>
        </div>
     </form>
    </aside>

</div>
</div>
</section>

{% endblock %}
